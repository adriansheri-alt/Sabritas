<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fill Rate Tracker — Sabeamex</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:Arial,Helvetica,sans-serif;background:#f4f4f4;color:#1a1a1a;font-size:13px;}
button{cursor:pointer;font-family:inherit;}
input,select{font-family:inherit;}

#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f4f4f4;padding:20px;}
.login-box{background:#fff;border:1px solid #ddd;border-radius:8px;padding:32px 24px;width:100%;max-width:360px;box-shadow:0 2px 12px rgba(0,0,0,.08);}
.login-title{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px;}
.login-sub{font-size:12px;color:#888;text-align:center;margin-bottom:24px;}
.lf{margin-bottom:14px;}
.lf label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#999;display:block;margin-bottom:5px;}
.lf input{width:100%;border:1px solid #ccc;color:#1a1a1a;font-size:15px;padding:12px;border-radius:6px;outline:none;background:#fff;-webkit-appearance:none;}
.lf input:focus{border-color:#1a1a1a;}
.login-btn{width:100%;background:#1a1a1a;color:#fff;font-size:15px;font-weight:700;padding:13px;border:none;border-radius:6px;margin-top:6px;-webkit-appearance:none;}
.login-err{font-size:12px;color:#b02020;text-align:center;margin-top:12px;min-height:18px;}

#app{display:none;}

.hdr{background:#fff;border-bottom:1px solid #ddd;position:sticky;top:0;z-index:80;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #eee;gap:6px;}
.brand-name{font-size:13px;font-weight:700;}
.brand-sub{font-size:10px;color:#888;}
.hdr-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
.user-tag{font-size:11px;font-weight:700;background:#f0f0f0;border:1px solid #ddd;padding:4px 9px;border-radius:20px;color:#333;white-space:nowrap;}
.sdot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0;}
.sdot.ok{background:#2a7d4f;}.sdot.sy{background:#e07b00;}.sdot.er{background:#b02020;}
.slbl{font-size:10px;color:#888;}
.mes-btn{font-size:11px;font-weight:600;color:#333;background:#f4f4f4;border:1px solid #ccc;padding:5px 10px;border-radius:4px;white-space:nowrap;}
.logout-btn{font-size:11px;color:#888;background:none;border:1px solid #ddd;padding:5px 8px;border-radius:4px;}

.tabs{display:flex;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{font-size:12px;font-weight:600;padding:10px 14px;border:none;background:transparent;color:#888;border-bottom:2px solid transparent;white-space:nowrap;}
.tab.on{color:#1a1a1a;border-bottom-color:#1a1a1a;}

.kpi-bar{display:grid;grid-template-columns:repeat(5,1fr);background:#fff;border-bottom:1px solid #ddd;}
.ki{padding:9px 8px;border-right:1px solid #eee;}
.ki:last-child{border-right:none;}
.kl{font-size:8px;font-weight:700;text-transform:uppercase;color:#999;margin-bottom:2px;}
.kv{font-size:16px;font-weight:700;line-height:1;color:#1a1a1a;}
.kv.ok{color:#2a7d4f;}.kv.wa{color:#9a5e00;}.kv.da{color:#b02020;}
.ks{font-size:8px;color:#aaa;margin-top:2px;}

.ps{background:#fff;border-bottom:1px solid #ddd;padding:10px 14px;}
.ps-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.ps-lbl{font-size:9px;font-weight:700;text-transform:uppercase;color:#999;}
.ps-pct{font-size:20px;font-weight:700;}
.track{height:5px;background:#e8e8e8;border-radius:3px;overflow:hidden;}
.tf{height:100%;border-radius:3px;transition:width .5s;}

.tb{background:#fff;border-bottom:1px solid #ddd;padding:7px 10px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;flex-wrap:wrap;}
.tb::-webkit-scrollbar{display:none;}
.fb{font-size:11px;font-weight:600;padding:5px 10px;border-radius:3px;border:1px solid #ccc;color:#666;background:#fff;white-space:nowrap;}
.fb.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.fb.fd.on{background:#fdf0f0;color:#b02020;border-color:#e0a0a0;}
.fb.fw.on{background:#fdf6ec;color:#9a5e00;border-color:#e0c080;}
.fb.fo.on{background:#f0f8f4;color:#2a7d4f;border-color:#90cca8;}
.tsep{width:1px;height:18px;background:#ddd;flex-shrink:0;}
.tbtn{font-size:11px;font-weight:600;padding:5px 10px;border-radius:3px;border:1px solid #ccc;color:#444;background:#fff;white-space:nowrap;}
.tbtn.pr{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.tbtn.bl{background:#eaf2ff;color:#1a5ea8;border-color:#aacbee;}

.sh{display:flex;justify-content:space-between;align-items:center;padding:11px 14px 5px;}
.st{font-size:10px;font-weight:700;text-transform:uppercase;color:#888;}
.sc{font-size:11px;color:#aaa;}

.sl{padding:0 10px 80px;display:flex;flex-direction:column;gap:5px;}
.sk{background:#fff;border:1px solid #ddd;border-radius:6px;overflow:hidden;}
.sk.st-ok{border-left:3px solid #2a7d4f;}.sk.st-wa{border-left:3px solid #c8820a;}
.sk.st-da{border-left:3px solid #b02020;}.sk.st-no{border-left:3px solid #ccc;}.sk.st-ov{border-left:3px solid #1a5ea8;}
.sr{display:grid;grid-template-columns:1fr auto;gap:6px;padding:9px 11px 0;cursor:pointer;align-items:start;}
.sn{font-size:12px;font-weight:700;margin-bottom:1px;}
.sc2{font-size:9px;color:#bbb;font-family:‘Courier New’,monospace;}
.srr{text-align:right;}
.sp{font-size:19px;font-weight:700;line-height:1;}
.sp.ok{color:#2a7d4f;}.sp.wa{color:#9a5e00;}.sp.da{color:#b02020;}.sp.no{color:#bbb;}.sp.ov{color:#1a5ea8;}
.srat{font-size:10px;color:#999;}
.sb{padding:6px 11px 0;}.sbi{height:4px;background:#eee;border-radius:2px;overflow:hidden;}
.sbf{height:100%;border-radius:2px;transition:width .4s;}
.bok{background:#2a7d4f;}.bwa{background:#c8820a;}.bda{background:#b02020;}.bno{background:#ccc;}.bov{background:#1a5ea8;}
.ch{display:flex;gap:4px;padding:5px 11px 9px;flex-wrap:wrap;}
.cp{font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;}
.cp.ok{background:#eaf5f0;color:#2a7d4f;}.cp.wa{background:#fdf6ec;color:#9a5e00;}
.cp.da{background:#fdf0f0;color:#b02020;}.cp.no{background:#f2f2f2;color:#888;}
.cp.bl{background:#eaf2ff;color:#1a5ea8;}.cp.gy{background:#f2f2f2;color:#666;font-size:9px;}

.det{border-top:1px solid #eee;display:none;}
.det.op{display:block;}
.ds{padding:10px 11px;border-bottom:1px solid #f0f0f0;}
.ds:last-child{border-bottom:none;}
.dt{font-size:9px;font-weight:700;text-transform:uppercase;color:#bbb;margin-bottom:7px;}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.sb2{background:#f8f8f8;border:1px solid #e8e8e8;border-radius:5px;padding:7px;text-align:center;}
.sl2{font-size:8px;font-weight:700;text-transform:uppercase;color:#aaa;margin-bottom:2px;}
.sv{font-size:13px;font-weight:700;}
.se{font-size:10px;color:#aaa;margin-top:1px;}
.sp2{font-size:10px;font-weight:700;margin-top:2px;}
.et{width:100%;border-collapse:collapse;font-size:11px;}
.et th{font-size:8px;font-weight:700;text-transform:uppercase;color:#aaa;text-align:left;padding:3px 5px;border-bottom:1px solid #eee;}
.et td{padding:5px 5px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
.et tr:last-child td{border-bottom:none;}
.tt{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;text-transform:uppercase;}
.tp{background:#f0eeff;color:#5533cc;}.ta{background:#eaf2ff;color:#1a5ea8;}.tm{background:#eaf5f0;color:#2a7d4f;}
.cb{font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;border:1px solid #90cca8;background:#f0f8f4;color:#2a7d4f;}
.ctg{font-size:10px;color:#2a7d4f;font-weight:600;}
.db{background:none;border:none;color:#ddd;font-size:13px;padding:2px 4px;}
.rf{display:flex;flex-direction:column;gap:6px;}
.rr{display:flex;gap:5px;}
.inp{flex:1;background:#fff;border:1px solid #ccc;color:#1a1a1a;font-size:12px;padding:7px 9px;border-radius:4px;outline:none;min-width:0;-webkit-appearance:none;}
.inp::placeholder{color:#ccc;}
.isml{flex:0 0 86px;}
.ra{background:#1a1a1a;color:#fff;font-size:11px;font-weight:700;padding:7px 11px;border:none;border-radius:4px;white-space:nowrap;}
.ca2{display:flex;gap:5px;padding:7px 11px;flex-wrap:wrap;}
.ca{font-size:10px;font-weight:600;padding:4px 9px;border-radius:3px;background:none;}
.ce{border:1px solid #ddd;color:#555;}.cd{border:1px solid #e0a0a0;color:#b02020;}

.fbb{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ddd;padding:8px 10px;display:flex;gap:5px;z-index:60;}
.fab{flex:1;font-size:11px;font-weight:700;padding:9px 4px;border-radius:4px;display:flex;align-items:center;justify-content:center;gap:4px;}
.fab.pr{background:#1a1a1a;color:#fff;border:none;}.fab.sc{background:#fff;color:#444;border:1px solid #ccc;}.fab.bl{background:#eaf2ff;color:#1a5ea8;border:1px solid #aacbee;}

.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s;}
.ov.op{opacity:1;pointer-events:all;}
.sh2{background:#fff;border-radius:12px 12px 0 0;padding:18px 16px 32px;width:100%;max-width:540px;transform:translateY(14px);transition:transform .18s;max-height:88vh;overflow-y:auto;}
.ov.op .sh2{transform:translateY(0);}
.sht{font-size:15px;font-weight:700;margin-bottom:3px;}
.shs{font-size:11px;color:#888;margin-bottom:14px;line-height:1.5;}
.fi{margin-bottom:9px;}
.fi label{font-size:9px;font-weight:700;text-transform:uppercase;color:#999;display:block;margin-bottom:3px;}
.fi input,.fi select{width:100%;background:#fff;border:1px solid #ccc;color:#1a1a1a;font-size:13px;padding:9px 10px;border-radius:5px;outline:none;-webkit-appearance:none;}
.br{display:flex;gap:6px;margin-top:14px;}
.bc{flex:1;background:#fff;border:1px solid #ccc;color:#888;font-size:12px;font-weight:600;padding:10px;border-radius:5px;}
.bk{flex:2;background:#1a1a1a;color:#fff;font-size:13px;font-weight:700;padding:10px;border-radius:5px;border:none;}
.bk.bl{background:#1a5ea8;}
.mg{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0 12px;}
.mo{font-size:12px;font-weight:600;padding:6px 13px;border-radius:4px;border:1px solid #ccc;color:#666;background:#fff;}
.mo.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}

.lw{padding:10px 10px 100px;}
.li{background:#fff;border:1px solid #ddd;border-radius:6px;padding:10px 12px;font-size:11px;color:#555;line-height:1.6;margin-bottom:10px;}
.lt{background:#fff;border:1px solid #ddd;border-radius:6px;overflow:hidden;}
.lr{display:grid;grid-template-columns:68px 58px 1fr;gap:6px;padding:8px 10px;border-bottom:1px solid #f0f0f0;}
.lr:last-child{border-bottom:none;}
.lr:nth-child(even){background:#fafafa;}
.lti{font-size:9px;color:#aaa;font-family:‘Courier New’,monospace;line-height:1.4;}
.lu{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;text-align:center;}
.u-adrian{background:#1a1a1a;color:#fff;}.u-raul{background:#1a5ea8;color:#fff;}
.u-cinthya{background:#7b3fb8;color:#fff;}.u-luis{background:#2a7d4f;color:#fff;}
.la{font-size:11px;color:#333;line-height:1.4;}
.le{text-align:center;padding:28px;color:#aaa;font-size:12px;}

.fcs{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:10px 10px 0;}
.fci{background:#fff;border:1px solid #ddd;border-radius:5px;padding:8px 10px;}
.fcl{font-size:8px;font-weight:700;text-transform:uppercase;color:#aaa;margin-bottom:2px;}
.fcv{font-size:15px;font-weight:700;}
.fcs2{font-size:9px;color:#aaa;}
.fcc{background:#fff;border:1px solid #ddd;border-radius:6px;overflow:hidden;margin:10px 10px 0;}
.fch{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;cursor:pointer;}
.fct{font-size:12px;font-weight:700;}
.fcto{font-size:11px;color:#888;}
.fcb{border-top:1px solid #eee;display:none;}
.fcb.op{display:block;}
.fctb{width:100%;border-collapse:collapse;font-size:11px;}
.fctb th{font-size:8px;font-weight:700;text-transform:uppercase;color:#aaa;text-align:left;padding:6px 8px;border-bottom:1px solid #eee;background:#fafafa;}
.fctb td{padding:5px 8px;border-bottom:1px solid #f4f4f4;}
.fctb tr:last-child td{border-bottom:none;}
.fctb td:nth-child(n+2){font-weight:700;text-align:right;}
.ftr{font-weight:700;background:#f8f8f8;border-top:2px solid #ddd !important;}
.fz{color:#ccc;}

.gw{padding:10px 10px 80px;display:flex;flex-direction:column;gap:8px;}
.gc{background:#fff;border:1px solid #ddd;border-radius:6px;overflow:hidden;}
.gh{display:flex;align-items:center;gap:9px;padding:11px 12px;cursor:pointer;}
.gn{width:22px;height:22px;border-radius:50%;background:#1a1a1a;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.gtx{flex:1;}.gtt{font-size:12px;font-weight:700;}.gts{font-size:10px;color:#888;margin-top:1px;}
.gar{font-size:11px;color:#aaa;}
.gb{padding:10px 12px;display:none;border-top:1px solid #eee;}
.gb.op{display:block;}
.gsp{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid #f4f4f4;font-size:11px;color:#444;line-height:1.5;}
.gsp:last-child{border-bottom:none;}
.gd{width:5px;height:5px;border-radius:50%;background:#1a1a1a;margin-top:6px;flex-shrink:0;}

.ld{text-align:center;padding:40px 20px;color:#888;}
.em{text-align:center;padding:36px 20px;color:#aaa;}
</style>

</head>
<body>

<!-- LOGIN -->

<div id="login-screen">
  <div class="login-box">
    <div class="login-title">Fill Rate Tracker</div>
    <div class="login-sub">Sabeamex · PepsiCo / Monarrez</div>
    <div class="lf">
      <label>Usuario</label>
      <input type="text" id="lu" placeholder="Tu usuario" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false">
    </div>
    <div class="lf">
      <label>Contraseña</label>
      <input type="password" id="lp" placeholder="Tu contraseña" autocomplete="off">
    </div>
    <button class="login-btn" id="login-btn">Entrar</button>
    <div class="login-err" id="lerr"></div>
  </div>
</div>

<!-- APP -->

<div id="app">
  <div class="hdr">
    <div class="hdr-top">
      <div><div class="brand-name">Fill Rate — Sabeamex</div><div class="brand-sub">PepsiCo · Monarrez · Tiempo real</div></div>
      <div class="hdr-right">
        <span class="user-tag" id="utag">—</span>
        <div style="display:flex;align-items:center;gap:3px">
          <div class="sdot" id="sdot"></div>
          <span class="slbl" id="slbl">Local</span>
        </div>
        <button class="mes-btn" onclick="openMes()"><span id="mlbl">MAR 2026</span> ▾</button>
        <button class="logout-btn" onclick="doLogout()">Salir</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab on"  onclick="setTab('PEPSICO',this)">PepsiCo</button>
      <button class="tab"     onclick="setTab('MONARREZ',this)">Monarrez</button>
      <button class="tab"     onclick="setTab('OTROS',this)">Otros</button>
      <button class="tab"     onclick="setTab('FC',this)">Forecast Abr</button>
      <button class="tab"     onclick="setTab('GUIA',this)">📋 Guía</button>
      <button class="tab"     onclick="setTab('LOG',this)">🕓 Actividad</button>
    </div>
  </div>
  <div class="kpi-bar" id="kbar"></div>
  <div class="ps" id="pstrip">
    <div class="ps-row"><span class="ps-lbl">Fill Rate del mes</span><span class="ps-pct" id="ppct">—</span></div>
    <div class="track"><div class="tf" id="tfill" style="width:0%"></div></div>
  </div>
  <div class="tb" id="tbar">
    <div style="display:flex;gap:4px">
      <button class="fb on"  onclick="setF('all',this)">Todos</button>
      <button class="fb fd"  onclick="setF('da',this)">Sin entregar</button>
      <button class="fb fw"  onclick="setF('wa',this)">Parcial</button>
      <button class="fb fo"  onclick="setF('ok',this)">Completos</button>
    </div>
    <div class="tsep"></div>
    <button class="tbtn pr" onclick="tup('c')">↑ Congelado</button>
    <button class="tbtn bl" onclick="tup('p')">↑ Programación</button>
    <button class="tbtn"    onclick="openM('msku')">+ SKU</button>
    <input type="file" id="fc" accept=".xlsx,.xls" style="display:none" onchange="hup('c',this)">
    <input type="file" id="fp" accept=".xlsx,.xls" style="display:none" onchange="hup('p',this)">
  </div>
  <div class="sh" id="sechdr"><span class="st" id="sectit">SKUs — PepsiCo</span><span class="sc" id="seccnt"></span></div>
  <div id="mc"><div class="ld">Cargando...</div></div>
  <div class="fbb" id="fbb">
    <button class="fab sc" onclick="tup('c')">↑ Congelado</button>
    <button class="fab pr" onclick="tup('p')">↑ Programación</button>
    <button class="fab bl" onclick="openAdic()">+ Adicional</button>
  </div>
</div>

<!-- MODALS -->

<div class="ov" id="mmes"><div class="sh2">
  <div class="sht">Seleccionar mes</div>
  <div class="fi"><label>Año</label><input id="ianio" type="number" value="2026" min="2024" max="2030"></div>
  <div class="mg" id="mgrid"></div>
  <div class="br"><button class="bc" onclick="closeM('mmes')">Cerrar</button></div>
</div></div>

<div class="ov" id="msku"><div class="sh2">
  <div class="sht">Agregar SKU</div>
  <div class="shs">O usa "↑ Congelado" para importar el Excel.</div>
  <div class="fi"><label>Nombre corto</label><input id="inom" placeholder="Ej: CHEETOS XFH COMPARTE"></div>
  <div class="fi"><label>Clave PepsiCo</label><input id="inclv" placeholder="Ej: CHEETOS XFH COMP MB 145GRX14X1"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
    <div class="fi"><label>W10</label><input id="ic10" type="number" min="0" placeholder="0"></div>
    <div class="fi"><label>W11</label><input id="ic11" type="number" min="0" placeholder="0"></div>
    <div class="fi"><label>W12</label><input id="ic12" type="number" min="0" placeholder="0"></div>
    <div class="fi"><label>W13</label><input id="ic13" type="number" min="0" placeholder="0"></div>
  </div>
  <div class="br"><button class="bc" onclick="closeM('msku')">Cancelar</button><button class="bk" onclick="addSku()">Agregar</button></div>
</div></div>

<div class="ov" id="mcong"><div class="sh2">
  <div class="sht">Editar Congelado</div>
  <div class="fi"><label>SKU</label><select id="scsk"></select></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
    <div class="fi"><label>W10</label><input id="inc10" type="number" min="0"></div>
    <div class="fi"><label>W11</label><input id="inc11" type="number" min="0"></div>
    <div class="fi"><label>W12</label><input id="inc12" type="number" min="0"></div>
    <div class="fi"><label>W13</label><input id="inc13" type="number" min="0"></div>
  </div>
  <div class="br"><button class="bc" onclick="closeM('mcong')">Cancelar</button><button class="bk" onclick="saveCong()">Guardar</button></div>
</div></div>

<div class="ov" id="madic"><div class="sh2">
  <div class="sht">Registrar Adicional</div>
  <div class="shs">Volumen fuera del congelado.</div>
  <div class="fi"><label>SKU</label><select id="sask"></select></div>
  <div class="fi"><label>Cajas adicionales</label><input id="iacnt" type="number" min="1" placeholder="0"></div>
  <div class="br"><button class="bc" onclick="closeM('madic')">Cancelar</button><button class="bk bl" onclick="saveAdic()">Confirmar</button></div>
</div></div>

<script>
// ═══════════════════════════════
// USERS — login sin Firebase
// ═══════════════════════════════
const USERS={
  adrian:{p:'adrian123',d:'Adrian'},
  raul:{p:'raul123',d:'Raul'},
  cinthya:{p:'cinthya123',d:'Cinthya'},
  luis:{p:'luis123',d:'Luis'}
};
let CU=null;

function doLogin(){
  const u=document.getElementById('lu').value.trim().toLowerCase();
  const p=document.getElementById('lp').value;
  const e=document.getElementById('lerr');
  if(USERS[u]&&USERS[u].p===p){
    CU={k:u,d:USERS[u].d};
    e.textContent='';
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('utag').textContent='👤 '+CU.d;
    initData();
    logA('login','Inició sesión');
  } else {
    e.textContent='Usuario o contraseña incorrectos.';
    document.getElementById('lp').value='';
  }
}
document.getElementById('login-btn').addEventListener('click',doLogin);
document.getElementById('lp').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('lu').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('lp').focus();});

function doLogout(){
  logA('logout','Cerró sesión');
  CU=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('lu').value='';
  document.getElementById('lp').value='';
}

function pad(n){return String(n).padStart(2,'0');}

function localSave(){
  try{
    localStorage.setItem('sbmx_data',JSON.stringify(ST));
    localStorage.setItem('sbmx_log',JSON.stringify(ALOG));
  }catch(e){}
}
function localLoad(){
  try{
    const d=localStorage.getItem('sbmx_data');
    const l=localStorage.getItem('sbmx_log');
    if(d) ST=JSON.parse(d);
    if(l) ALOG=JSON.parse(l);
    if(!ST.provs) ST.provs={};
    if(!ST.provs.PEPSICO)  ST.provs.PEPSICO={skus:[]};
    if(!ST.provs.MONARREZ) ST.provs.MONARREZ={skus:[]};
    if(!ST.provs.OTROS)    ST.provs.OTROS={skus:[]};
  }catch(e){}
}

function initData(){
  localLoad();
  // Check if PEPSICO has no skus → load seed
  if(!ST.provs.PEPSICO.skus.length){
    const key='MAR-2026';
    SEED.forEach(s=>{
      const sku={nom:s.n,clave:s.c,congelados:{},entregas:{},adicionales:{}};
      sku.congelados[key]={W10:s.w[0],W11:s.w[1],W12:s.w[2],W13:s.w[3]};
      sku.entregas[key]=(SPROG[s.n]||[]).map(e=>({fecha:e.f,cant:e.cant,tipo:'prog',sem:e.sem,confirmado:e.ok}));
      sku.adicionales[key]=0;
      ST.provs.PEPSICO.skus.push(sku);
    });
    localSave();
  }
  // Try Firebase in background
  tryFirebase();
  setSyncStatus('ok','Local ✓');
  render();
}

function setSyncStatus(s,l){
  const d=document.getElementById('sdot');
  const lb=document.getElementById('slbl');
  if(!d||!lb)return;
  d.className='sdot '+(s==='ok'?'ok':s==='er'?'er':'sy');
  lb.textContent=l;
}

function save(){
  localSave();
  if(fbOk) fbSave();
}

function logA(type,desc,prov){
  if(!CU)return;
  const now=new Date();
  ALOG.unshift({
    ts:now.getTime(),
    fecha:`${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()}`,
    hora:`${pad(now.getHours())}:${pad(now.getMinutes())}`,
    user:CU.d, uk:CU.k, type, desc, prov:prov||''
  });
  if(ALOG.length>200) ALOG=ALOG.slice(0,200);
  localSave();
  if(fbOk) fbLogPush({ts:now.getTime(),fecha:`${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()}`,hora:`${pad(now.getHours())}:${pad(now.getMinutes())}`,user:CU.d,uk:CU.k,type,desc,prov:prov||''});
}

function tryFirebase(){
  // Load Firebase scripts dynamically after login
  setSyncStatus('sy','Conectando...');
  loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js',()=>{
    loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js',()=>{
      try{
        if(!firebase.apps.length) firebase.initializeApp(FBC);
        fbDb=firebase.database();
        fbOk=true;
        setSyncStatus('sy','Sincronizando...');
        // Get data from Firebase, merge with local
        fbDb.ref('sabeamex').once('value').then(snap=>{
          const data=snap.val();
          if(data){
            const t=ST.tab,m=ST.mes;
            ST=data; ST.tab=t; ST.mes=m;
            if(!ST.provs) ST.provs={};
            if(!ST.provs.PEPSICO)  ST.provs.PEPSICO={skus:[]};
            if(!ST.provs.MONARREZ) ST.provs.MONARREZ={skus:[]};
            if(!ST.provs.OTROS)    ST.provs.OTROS={skus:[]};
            localSave();
            render();
          } else {
            fbSave(); // push local data to Firebase
          }
          setSyncStatus('ok','Sincronizado ✓');
          // Now listen for real-time changes
          fbDb.ref('sabeamex').on('value',snap2=>{
            const d2=snap2.val();
            if(d2){
              const t=ST.tab,m=ST.mes;
              ST=d2; ST.tab=t; ST.mes=m;
              if(!ST.provs) ST.provs={};
              if(!ST.provs.PEPSICO)  ST.provs.PEPSICO={skus:[]};
              if(!ST.provs.MONARREZ) ST.provs.MONARREZ={skus:[]};
              if(!ST.provs.OTROS)    ST.provs.OTROS={skus:[]};
              localSave();
              setSyncStatus('ok','Sincronizado ✓');
              render();
            }
          });
          fbDb.ref('activity').on('value',snap3=>{
            const d3=snap3.val();
            if(d3){
              ALOG=Object.values(d3).sort((a,b)=>b.ts-a.ts);
              if(ST.tab==='LOG') renderLog();
            }
          });
        }).catch(()=>setSyncStatus('ok','Local ✓'));
      }catch(e){
        fbOk=false;
        setSyncStatus('ok','Local ✓');
      }
    },()=>setSyncStatus('ok','Local ✓'));
  },()=>setSyncStatus('ok','Local ✓'));
}

function loadScript(src,onload,onerror){
  const s=document.createElement('script');
  s.src=src; s.async=true;
  s.onload=onload||function(){};
  s.onerror=onerror||function(){};
  document.head.appendChild(s);
}

function fbSave(){
  if(!fbDb||!fbOk)return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    setSyncStatus('sy','Guardando...');
    fbDb.ref('sabeamex').set(ST)
      .then(()=>setSyncStatus('ok','Sincronizado ✓'))
      .catch(()=>setSyncStatus('ok','Local ✓'));
  },700);
}

function fbLogPush(entry){
  if(!fbDb||!fbOk)return;
  fbDb.ref('activity').push(entry).catch(()=>{});
}

// ═══════════════════════════════
// CALCS
// ═══════════════════════════════
function mk(){return `${MESES[ST.mes.m]}-${ST.mes.y}`;}
function gc(s){const c=s.congelados[mk()]||{};return(c.W10||0)+(c.W11||0)+(c.W12||0)+(c.W13||0);}
function ge(s){return(s.entregas[mk()]||[]).filter(e=>e.confirmado!==false).reduce((a,e)=>a+e.cant,0);}
function gp(s){return(s.entregas[mk()]||[]).filter(e=>e.confirmado===false).reduce((a,e)=>a+e.cant,0);}
function ga(s){return s.adicionales[mk()]||0;}
function gpct(s){const c=gc(s);return c?Math.min(999,Math.round((ge(s)/c)*100)):0;}
function gst(s){const c=gc(s),p=gpct(s);if(!c)return'no';if(p>100)return'ov';if(p>=90)return'ok';if(p>=30)return'wa';return'da';}
function glbl(st,p){if(st==='no')return'Sin congelado';if(st==='ov')return'Sobre entregado';if(p>=100)return'Completo ✓';if(p>=90)return'Casi completo';if(p>=30)return'En proceso';if(p>0)return'Atrasado';return'Sin entregas';}
function setF(f,el){filt=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));el.classList.add('on');render();}
function fskip(s){if(filt==='all')return false;const st=gst(s);if(filt==='da')return!(st==='da'||st==='no');if(filt==='wa')return st!=='wa';if(filt==='ok')return!(st==='ok'||st==='ov');return false;}

  const sp=ST.tab==='FC'||ST.tab==='GUIA'||ST.tab==='LOG';

  document.getElementById('pstrip').style.display=sp?'none':'block';
  document.getElementById('tbar').style.display=sp?'none':'flex';
  document.getElementById('fbb').style.display=sp?'none':'flex';
  document.getElementById('sechdr').style.display='flex';
  if(ST.tab==='FC'){rFC();return;}
  if(ST.tab==='GUIA'){rGuia();return;}
  if(ST.tab==='LOG'){renderLog();return;}

  const skus=ST.provs[ST.tab].skus;
  const vis=skus.filter(s=>!fskip(s));
  let tC=0,tE=0,tP=0,comp=0;
  skus.forEach(s=>{tC+=gc(s);tE+=ge(s);tP+=gp(s);if(gc(s)>0&&ge(s)>=gc(s))comp++;});
  const pG=tC?Math.round((tE/tC)*100):0;
  const falt=Math.max(0,tC-tE);
  const col=pG>=90?'#2a7d4f':pG>=50?'#c8820a':'#b02020';
  const pn=ST.tab==='PEPSICO'?'PepsiCo Directo':ST.tab==='MONARREZ'?'Monarrez':'Otros';

              <button class="ra" onclick="regE(${ri})">+ Registrar</button>
            </div>
          </div>
        </div>
        <div class="ca2">
          <button class="ca ce" onclick="editC(${ri})">✏ Editar congelado</button>
          <button class="ca cd" onclick="delS(${ri})">🗑 Eliminar SKU</button>
        </div>
      </div>
    </div>`;
  }).join('')+'</div>';
}

function renderLog(){

function rFC(){
  const tw=[0,0,0,0];let gt=0;

  document.getElementById('sectit').textContent='Forecast Abril 2026';

    <div class="fcs">

      <div class="fci"><div class="fcl">SKUs activos</div><div class="fcv">${act}</div><div class="fcs2">de ${FA.length}</div></div>
      <div class="fci"><div class="fcl">En cero</div><div class="fcv">${FA.length-act}</div><div class="fcs2">sin solicitud</div></div>
    </div>
    <div style="padding:8px 10px">
      <div style="background:#fff;border:1px solid #ddd;border-radius:5px;padding:10px 12px;font-size:11px;color:#555;line-height:1.6;margin-bottom:8px">
        <b>Forecast = lo que Sabeamex solicita a PepsiCo para abril.</b> PepsiCo responde con el congelado. Cuando llegue, súbelo con "↑ Congelado" en la pestaña PepsiCo.
      </div>
      <div class="fcc">
        <div class="fch" onclick="togFC(0)"><span class="fct">Detalle por SKU</span><span class="fcto">${gt.toLocaleString()} cajas ▾</span></div>
        <div class="fcb${openFC[0]?' op':''}" id="fc-0">
          <table class="fctb">
            <tr><th>SKU</th><th>W10</th><th>W11</th><th>W12</th><th>W13</th><th>Total</th></tr>
            ${FA.map(s=>{const tot=s.w.reduce((a,b)=>a+b,0);const em=tot===0;return`<tr style="${em?'opacity:.4':''}">
              <td style="font-size:11px;font-weight:${em?'400':'700'}">${s.n}</td>
              ${s.w.map(v=>`<td class="${v===0?'fz':''}">${v===0?'—':v.toLocaleString()}</td>`).join('')}

    ${secs.map((s,i)=>`<div class="gc">
      <div class="gh" onclick="togG(${i})"><div class="gn">${s.n}</div><div class="gtx"><div class="gtt">${s.t}</div><div class="gts">${s.s}</div></div><span class="gar" id="ga-${i}">${openG[i]?'▴':'▾'}</span></div>
      <div class="gb${openG[i]?' op':''}" id="gb-${i}">${s.ps.map(p=>`<div class="gsp"><div class="gd"></div><div>${p}</div></div>`).join('')}</div>

// INTERACTIONS
// ═══════════════════════════════
function tog(i){openD[i]=!openD[i];const d=document.getElementById(`det-${i}`);if(d)d.classList.toggle('op',openD[i]);}
function togFC(i){openFC[i]=!openFC[i];const d=document.getElementById(`fc-${i}`);if(d)d.classList.toggle('op',openFC[i]);}
function togG(i){openG[i]=!openG[i];const b=document.getElementById(`gb-${i}`);if(b)b.classList.toggle('op',openG[i]);const a=document.getElementById(`ga-${i}`);if(a)a.textContent=openG[i]?'▴':'▾';}

function confirmar(si,ei){
  const sku=ST.provs[ST.tab].skus[si],en=sku.entregas[mk()][ei];
  en.confirmado=true;
  logA('confirmar',`Confirmó ${en.cant.toLocaleString()} cajas — ${sku.nom}`,ST.tab);
  openD[si]=true; save(); render();
}
function regE(ri){
  const c=parseInt(document.getElementById(`ec-${ri}`).value);if(!c||c<=0)return;
  const sem=document.getElementById(`es-${ri}`).value;
  const fv=document.getElementById(`ef-${ri}`).value.trim();
  const hoy=new Date(),fecha=fv||`${pad(hoy.getDate())}/${pad(hoy.getMonth()+1)}`;
  const key=mk(),sku=ST.provs[ST.tab].skus[ri];
  if(!sku.entregas[key])sku.entregas[key]=[];
  sku.entregas[key].push({fecha,cant:c,tipo:'man',sem,confirmado:true});
  logA('entrega',`Registró ${c.toLocaleString()} cajas — ${sku.nom} ${sem}`,ST.tab);
  document.getElementById(`ec-${ri}`).value='';
  document.getElementById(`ef-${ri}`).value='';
  document.getElementById(`es-${ri}`).value='';
  openD[ri]=true; save(); render();
}
function delE(si,ei){const en=ST.provs[ST.tab].skus[si].entregas[mk()][ei];logA('del',`Eliminó ${en.cant} cajas — ${ST.provs[ST.tab].skus[si].nom}`,ST.tab);ST.provs[ST.tab].skus[si].entregas[mk()].splice(ei,1);openD[si]=true;save();render();}
function delS(i){if(!confirm('¿Eliminar SKU?'))return;logA('del-sku',`Eliminó SKU: ${ST.provs[ST.tab].skus[i].nom}`,ST.tab);ST.provs[ST.tab].skus.splice(i,1);save();render();}
function editC(i){
  const sku=ST.provs[ST.tab].skus[i];
  document.getElementById('scsk').innerHTML=`<option value="${i}">${sku.nom}</option>`;
  const c=sku.congelados[mk()]||{};
  ['nc10','nc11','nc12','nc13'].forEach((id,j)=>document.getElementById(`in${id}`).value=c[`W${10+j}`]||0);
  openM('mcong');
}

function tup(t){document.getElementById(t==='c'?'fc':'fp').click();}
function hup(type,input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      if(type==='c')impC(rows); else impP(rows);
    }catch(err){alert('Error leyendo el archivo.');}
  };
  reader.readAsBinaryString(file);input.value='';
}
function cn(v){if(v===null||v===undefined)return 0;if(typeof v==='number')return Math.round(v);return parseInt(String(v).replace(/[\s,\xa0]/g,''))||0;}
function impC(rows){
  let hdr=-1;for(let i=0;i<rows.length;i++){if(rows[i]&&rows[i].some(v=>String(v||'').toLowerCase().includes('clave'))){hdr=i;break;}}
  if(hdr===-1){alert('No se encontró fila de encabezados.');return;}
  const skus=ST.provs[ST.tab].skus,key=mk();let nv=0,up=0;
  for(let i=hdr+1;i<rows.length;i++){
    const r=rows[i];if(!r||!r[0])continue;
    const cu=String(r[0]||'').trim(),ig=String(r[1]||'').trim();
    const w10=cn(r[2]),w11=cn(r[3]),w12=cn(r[4]),w13=cn(r[5]);
    if(!cu||(!w10&&!w11&&!w12&&!w13))continue;
    const clave=ig.includes(' - ')?ig.split(' - ').slice(1).join(' - ').trim():ig;
    let ex=skus.find(s=>s.nom.toLowerCase()===cu.toLowerCase()||s.clave.toLowerCase()===clave.toLowerCase());
    if(ex){ex.congelados[key]={W10:w10,W11:w11,W12:w12,W13:w13};if(!ex.entregas[key])ex.entregas[key]=[];if(!ex.adicionales[key])ex.adicionales[key]=0;up++;}
    else{const sku={nom:cu,clave,congelados:{},entregas:{},adicionales:{}};sku.congelados[key]={W10:w10,W11:w11,W12:w12,W13:w13};sku.entregas[key]=[];sku.adicionales[key]=0;skus.push(sku);nv++;}
  }
  logA('cong',`Cargó congelado ${MESES[ST.mes.m]} ${ST.mes.y}: ${nv} nuevos, ${up} actualizados`,ST.tab);
  save();render();alert(`✓ Congelado cargado:\n• ${nv} SKUs nuevos\n• ${up} actualizados`);
}
function impP(rows){
  const skus=ST.provs[ST.tab].skus,key=mk();let ds=0,reg=0,nf=[];
  for(let i=0;i<rows.length;i++){if(rows[i]&&rows[i].some(v=>String(v||'').toLowerCase().includes('producto'))){ds=i+1;break;}}
  for(let i=ds;i<rows.length;i++){
    const r=rows[i];if(!r)continue;
    const prod=String(r[3]||'').trim(),cajas=cn(r[4]);if(!prod||!cajas)continue;
    const sm=String(r[2]||'').match(/W(\d+)/i),sem=sm?`W${sm[1]}`:'';
    let fecha='—';try{if(typeof r[5]==='number'){const d=XLSX.SSF.parse_date_code(r[5]);if(d)fecha=`${pad(d.d)}/${pad(d.m)}`;}}catch(e){}
    const found=skus.find(s=>s.clave.toLowerCase().includes(prod.toLowerCase().slice(0,10))||prod.toLowerCase().includes(s.clave.toLowerCase().slice(0,10)));
    if(found){if(!found.entregas[key])found.entregas[key]=[];const dup=found.entregas[key].find(e=>e.cant===cajas&&e.sem===sem&&e.tipo==='prog');if(!dup){found.entregas[key].push({fecha,cant:cajas,tipo:'prog',sem,confirmado:false});reg++;}}
    else nf.push(prod);
  }
  logA('prog',`Cargó programación: ${reg} entregas por confirmar`,ST.tab);
  save();render();
  let msg=`✓ Programación: ${reg} entregas por confirmar.`;
  if(nf.length)msg+=`\n\nNo encontrados:\n${[...new Set(nf)].slice(0,5).join('\n')}`;
  alert(msg);
}

function openM(id){document.getElementById(id).classList.add('op');}
function closeM(id){document.getElementById(id).classList.remove('op');}
document.querySelectorAll('.ov').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('op');}));

function addSku(){
  const nom=document.getElementById('inom').value.trim();if(!nom)return;
  const clave=document.getElementById('inclv').value.trim(),key=mk();
  const sku={nom,clave,congelados:{},entregas:{},adicionales:{}};
  sku.congelados[key]={W10:parseInt(document.getElementById('ic10').value)||0,W11:parseInt(document.getElementById('ic11').value)||0,W12:parseInt(document.getElementById('ic12').value)||0,W13:parseInt(document.getElementById('ic13').value)||0};
  sku.entregas[key]=[];sku.adicionales[key]=0;
  logA('add-sku',`Agregó SKU: ${nom}`,ST.tab);
  ST.provs[ST.tab].skus.push(sku);
  ['inom','inclv','ic10','ic11','ic12','ic13'].forEach(id=>document.getElementById(id).value='');
  closeM('msku');save();render();
}
function saveCong(){
  const i=parseInt(document.getElementById('scsk').value);
  ST.provs[ST.tab].skus[i].congelados[mk()]={W10:parseInt(document.getElementById('innc10').value)||0,W11:parseInt(document.getElementById('innc11').value)||0,W12:parseInt(document.getElementById('innc12').value)||0,W13:parseInt(document.getElementById('innc13').value)||0};
  logA('edit-cong',`Editó congelado de ${ST.provs[ST.tab].skus[i].nom}`,ST.tab);
  closeM('mcong');save();render();
}
function openAdic(){
  if(ST.tab==='FC'||ST.tab==='GUIA'||ST.tab==='LOG'){alert('Selecciona un proveedor primero.');return;}
  const skus=ST.provs[ST.tab].skus;if(!skus.length){alert('Carga el congelado primero.');return;}
  document.getElementById('sask').innerHTML=skus.map((s,i)=>`<option value="${i}">${s.nom}</option>`).join('');
  document.getElementById('iacnt').value='';openM('madic');
}
function saveAdic(){
  const i=parseInt(document.getElementById('sask').value);
  const cant=parseInt(document.getElementById('iacnt').value)||0;if(!cant)return;
  const key=mk(),sku=ST.provs[ST.tab].skus[i];
  sku.adicionales[key]=(sku.adicionales[key]||0)+cant;
  if(!sku.entregas[key])sku.entregas[key]=[];
  const hoy=new Date();
  sku.entregas[key].push({fecha:`${pad(hoy.getDate())}/${pad(hoy.getMonth()+1)}`,cant,tipo:'adic',sem:'',confirmado:true});
  logA('adicional',`Adicional ${cant.toLocaleString()} cajas — ${sku.nom}`,ST.tab);
  closeM('madic');save();render();
}
function setTab(tab,el){ST.tab=tab;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');openD={};render();}
function openMes(){
  document.getElementById('ianio').value=ST.mes.y;
  document.getElementById('mgrid').innerHTML=MESES.map((m,i)=>`<button class="mo${i===ST.mes.m?' on':''}" onclick="setMes(${i})">${m}</button>`).join('');
  openM('mmes');
}
function setMes(m){
  ST.mes={m,y:parseInt(document.getElementById('ianio').value)||2026};
  document.querySelectorAll('.mo').forEach((b,i)=>b.classList.toggle('on',i===m));
  openD={};render();
}
document.getElementById('ianio').addEventListener('change',()=>setMes(ST.mes.m));
</script>
